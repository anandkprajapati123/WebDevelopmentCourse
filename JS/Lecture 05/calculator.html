<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <input type="button" value="+" onclick="add()">
    <input type="button" value="-" onclick="sub()">
    <input type="button" value="*" onclick="mul()">
    <input type="button" value="%" onclick="mod()">
    <input type="button" value="/" onclick="div()"><br><br>
    <button id="btn" style="width: 50px;height: 20px;"></button>
</body>
<script>
    function add() {
        let a = Number(prompt("Enter a: "));
        let b = Number(prompt("Enter b: "));
        let result = a + b;
        document.querySelector("#btn").innerHTML = result;
    }
    function sub() {
        let a = Number(prompt("Enter a: "));
        let b = Number(prompt("Enter b: "));
        let result = a - b;
        document.querySelector("#btn").innerHTML = result;
    }
    function mul() {
        let a = Number(prompt("Enter a: "));
        let b = Number(prompt("Enter b: "));
        let result = a * b;
        document.querySelector("#btn").innerHTML = result;
    }
    function div() {
        let a = Number(prompt("Enter a: "));
        let b = Number(prompt("Enter b: "));
        let result = a / b;
        document.querySelector("#btn").innerHTML = result;
    }
    function mod() {
        let a = Number(prompt("Enter a: "));
        let b = Number(prompt("Enter b: "));
        let result = a % b;
        document.querySelector("#btn").innerHTML = result;
    }
</script>

</html>

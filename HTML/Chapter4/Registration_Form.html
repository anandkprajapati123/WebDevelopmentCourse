<html>

<head>
    <title>Registration Form</title>
</head>

<body>
    <table align="center">
        <tr>
            <td colspan="2" align="center">
                <h1>Student Registration Form</h1>
            </td>
        </tr>
        <tr>
            <td>Firstname:</td>
            <td><input type="text" placeholder="Firstname"></td>
        </tr>
        <tr>
            <td>Middlename:</td>
            <td><input type="text" placeholder="Middlename">
        </tr>
        <tr>
            <td>Lastname:</td>
            <td><input type="text" placeholder="lastname"></td>
        </tr>
        <tr>
            <td>Date Of Birth:</td>
            <td><input type="date"></td>
        </tr>
        <tr>
            <td>Mobile no:</td>
            <td><input type="text" size="1" value="+91">
                <input type="text" size="10" placeholder="Mobile no">
            </td><br><br>
        </tr>
        <tr>
            <td>Email:</td>
            <td><input type="text" size="30" placeholder="Enter Your Email">
            </td><br><br>
        </tr>
        <tr>
            <td>Course:</td>
            <td><select>
                    <option value="Course">Course</option>
                    <option value="BE/B-Tech">BE/B-Tech</option>
                    <option value="MCA">MCA</option>
                    <option value="MBA">MBA</option>
                </select></td><br><br>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" name="A" id="male">male
                <input type="radio" name="A" id="female"> female
                <input type="radio" name="A" id="other"> other
            </td>
        </tr>
        <tr>
            <td>Address:</td>
            <td><textarea placeholder="your address" cols="30" rows="4"></textarea></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td>
                <input type="password" name="password" placeholder="Enter Your Password">
            </td><br><br>
        </tr>
        <tr>
            <td>Repeat-Password:</td>
            <td>
                <input type="password" name="password" placeholder="Repeat-Password ">
            </td><br><br>
        </tr>
        <tr>
            <td><button>Register</button></td>
            <td><input type="reset"></td>
        </tr>
    </table>
</body>

</html>
